{% extends "base.html" %}

{% block content %}
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>

<div class="flex justify-center mt-6 px-4 pb-10">
    <div class="flex flex-col w-full max-w-5xl h-[75vh] min-h-[600px] overflow-hidden">
        
        <!-- Header -->
        <div class="border-b border-gray-200 p-4 shrink-0 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <div class="w-12 h-12 rounded-full overflow-hidden shadow-sm flex items-center justify-center bg-blue-50">
                    <img src="/static/images/bot_avatar.png" alt="AI Agent" class="w-full h-full object-cover">
                </div>
                <div>
                    <h2 class="text-lg font-bold text-gray-800">Personal Assistant</h2>
                    <p class="text-xs text-green-500 font-medium flex items-center gap-1">
                        <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span> Online
                    </p>
                </div>
            </div>
        </div>

        <!-- Chat Box -->
        <div id="chatBox" class="flex-1 overflow-y-auto p-4 space-y-3"></div>

        <!-- File Upload Info -->
        <div id="fileInfo" class="hidden px-4 py-2 text-sm text-gray-600 bg-gray-50 border-x">
            <span id="fileNameDisplay"></span>
            <button onclick="clearFiles()" class="ml-2 text-red-500 hover:text-red-700 font-bold">&times;</button>
        </div>

        <!-- Input Box -->
        <div class="px-4 pb-6 pt-2 shrink-0">
            <div class="flex items-end space-x-2 bg-white rounded-3xl border border-gray-200 focus-within:border-indigo-300 focus-within:ring-4 focus-within:ring-indigo-50 shadow-sm overflow-hidden transition-all duration-300 relative group">
                <!-- File attachment button -->
                <label for="fileInput" class="cursor-pointer p-3 pl-4 text-gray-400 hover:text-indigo-600 transition-colors" title="Attach Files">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13" />
                    </svg>
                </label>
                <input type="file" id="fileInput" class="hidden" multiple accept=".pdf,.xlsx,.xls,.doc,.docx,.csv,.txt" onchange="updateFileInfo()">

                <textarea id="messageInput" rows="1"
                    class="flex-1 py-3.5 pr-14 bg-transparent border-none focus:ring-0 resize-none max-h-32 text-gray-800 placeholder-gray-400 text-base leading-relaxed"
                    placeholder="Message Personal Assistant..."></textarea>
                
                <!-- Send button integrated inside the input area -->
                <button id="sendBtn" class="absolute right-1.5 bottom-1.5 p-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-full transition shadow-sm shrink-0 flex items-center justify-center disabled:opacity-50 disabled:cursor-not-allowed">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z" />
                    </svg>
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    const chatBox = document.getElementById("chatBox");
    const messageInput = document.getElementById("messageInput");
    const sendBtn = document.getElementById("sendBtn");
    const fileInput = document.getElementById("fileInput");
    const fileInfo = document.getElementById("fileInfo");
    const fileNameDisplay = document.getElementById("fileNameDisplay");

    function updateFileInfo() {
        if (fileInput.files.length > 0) {
            let names = Array.from(fileInput.files).map(f => f.name).join(", ");
            fileNameDisplay.textContent = "Attached: " + names;
            fileInfo.classList.remove("hidden");
        } else {
            clearFiles();
        }
    }

    function clearFiles() {
        fileInput.value = "";
        fileNameDisplay.textContent = "";
        fileInfo.classList.add("hidden");
    }

    function scrollToBottom() {
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    // Append message with animation + typing effect for assistant
    function appendMessage(message, sender, typing = false) {
        const wrapper = document.createElement("div");
        wrapper.classList.add("w-full", "flex", "fade-in");

        const div = document.createElement("div");
        div.classList.add(
            "p-3", "rounded-xl", "inline-block", "max-w-[80%]",
            "break-words", "bubble-anim"
        );

        const avatar = document.createElement("div");
        avatar.classList.add("w-8", "h-8", "rounded-full", "flex", "items-center", "justify-center", "text-white", "font-bold", "shadow-sm", "shrink-0", "mt-auto", "mb-2", "overflow-hidden");

        if (sender === "user") {
            div.classList.add("bg-blue-600", "text-white", "ml-auto");
            wrapper.classList.add("justify-end");
            div.innerHTML = marked.parse(message);
        }
        else if (sender === "assistant") {
            avatar.classList.add("bg-blue-100", "mr-2");
            avatar.innerHTML = `<img src="/static/images/bot_avatar.png" alt="Bot" class="w-full h-full object-cover">`;
            wrapper.appendChild(avatar);

            div.classList.add("bg-white", "text-gray-800", "mr-auto", "border", "border-gray-100", "rounded-bl-sm", "prose", "prose-sm");
            wrapper.classList.add("justify-start");

            if (typing) {
                avatar.classList.add("bot-floating"); // Apply floating animation when processing/typing
                let index = 0;
                const interval = setInterval(() => {
                    div.innerHTML = marked.parse(message.slice(0, index++));
                    scrollToBottom();
                    if (index > message.length) clearInterval(interval);
                }, 5);
            } else {
                div.innerHTML = marked.parse(message);
            }
        }

        wrapper.appendChild(div);
        chatBox.appendChild(wrapper);
        scrollToBottom();
    }

    // FIRST BOT MESSAGE (GREETING)
    window.onload = function () {
        appendMessage(
            "**Hello! I'm your Personal AI Assistant.**\n\nI can:\n- Check your active tasks\n- Extract data from your uploaded PDFs, Excels, or Docs\n- Check local Cosmos DB for product prices and items\n- Search the web for distributors, suppliers, and live prices\n\nHow can I help you today?",
            "assistant",
            true
        );
    };

    async function sendMessage() {
        const message = messageInput.value.trim();
        const files = fileInput.files;

        if (!message && files.length === 0) return;

        let displayMsg = message;
        if (files.length > 0) {
            displayMsg += `\n\n*(📎 Attached ${files.length} file(s))*`;
        }

        appendMessage(displayMsg, "user");

        // Disable inputs
        messageInput.value = "";
        messageInput.disabled = true;
        sendBtn.disabled = true;
        fileInput.disabled = true;

        // Loading bubble
        const loading = appendLoadingBubble();

        // Stop floating of the latest bot message once finished
        function removePulsing() {
            const bots = chatBox.querySelectorAll('.bot-floating');
            bots.forEach(b => b.classList.remove('bot-floating'));
        }

        try {
            const formData = new FormData();
            formData.append("message", message);
            for (let i = 0; i < files.length; i++) {
                formData.append("files", files[i]);
            }

            const res = await fetch("/api/personal_assistant/chat", {
                method: "POST",
                body: formData
            });

            const data = await res.json();
            loading.remove();
            removePulsing(); // Stop floating
            
            // Clear files after successful request starts processing
            clearFiles();

            if (data.reply) {
                appendMessage(data.reply, "assistant", true);
            } else {
                appendMessage("Error: " + data.error, "assistant");
            }
        } catch (err) {
            loading.remove();
            removePulsing(); // Stop floating
            appendMessage("Error connecting to server.", "assistant");
            console.error(err);
        } finally {
            messageInput.disabled = false;
            sendBtn.disabled = false;
            fileInput.disabled = false;
            messageInput.focus();
        }
    }

    function appendLoadingBubble() {
        const wrapper = document.createElement("div");
        wrapper.classList.add("w-full", "flex", "justify-start", "fade-in");

        const avatar = document.createElement("div");
        avatar.classList.add("w-8", "h-8", "rounded-full", "flex", "items-center", "justify-center", "text-white", "font-bold", "shadow-sm", "shrink-0", "mt-auto", "mb-2", "overflow-hidden", "bg-blue-100", "mr-2", "bot-floating");
        avatar.innerHTML = `<img src="/static/images/bot_avatar.png" alt="Bot" class="w-full h-full object-cover">`;
        wrapper.appendChild(avatar);

        const div = document.createElement("div");
        div.classList.add("p-3", "rounded-xl", "inline-block", "bg-white", "mr-auto", "border", "border-gray-100");
        div.innerHTML = `<span class="typing-dots"><span></span><span></span><span></span></span>`;

        wrapper.appendChild(div);
        chatBox.appendChild(wrapper);
        scrollToBottom();

        return wrapper;
    }

    // Enter to send, Shift+Enter for new line
    messageInput.addEventListener("keydown", function (e) {
        if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    sendBtn.addEventListener("click", sendMessage);
</script>

<style>
    /* Bubble pop animation */
    .bubble-anim {
        animation: popIn 0.1s ease-out;
    }

    @keyframes popIn {
        0% {
            transform: scale(0.8);
            opacity: 0;
        }

        100% {
            transform: scale(1);
            opacity: 1;
        }
    }

    /* Typing dots */
    .typing-dots span {
        height: 8px;
        width: 8px;
        margin: 0 2px;
        background: gray;
        border-radius: 50%;
        display: inline-block;
        animation: blink 1.4s infinite;
    }

    .typing-dots span:nth-child(2) {
        animation-delay: 0.1s;
    }

    .typing-dots span:nth-child(3) {
        animation-delay: 0.3s;
    }

    @keyframes blink {

        0%,
        100% {
            opacity: 0.2;
        }

        50% {
            opacity: 1;
        }
    }

    /* 3D Bot Avatar Floating Animation */
    .bot-floating {
        animation: floatBot 2s ease-in-out infinite;
        transform-origin: center bottom;
        box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.4);
    }
    @keyframes floatBot {
        0% { transform: translateY(0) scale(1) rotate(0deg); }
        50% { transform: translateY(-8px) scale(1.05) rotate(5deg); }
        100% { transform: translateY(0) scale(1) rotate(0deg); }
    }

    /* Custom scrollbar for chatbox */
    #chatBox::-webkit-scrollbar {
        width: 8px;
    }

    #chatBox::-webkit-scrollbar-track {
        background: #f1f1f1;
        border-radius: 10px;
    }

    #chatBox::-webkit-scrollbar-thumb {
        background: #888;
        border-radius: 10px;
    }

    #chatBox::-webkit-scrollbar-thumb:hover {
        background: #555;
    }

    /* Prose fixes for markdown container */
    .prose ul {
        list-style-type: disc;
        margin-left: 1.5rem;
    }

    .prose ol {
        list-style-type: decimal;
        margin-left: 1.5rem;
    }

    .prose a {
        color: #2563eb;
        text-decoration: underline;
    }

    .prose p {
        margin-bottom: 0.5rem;
    }

    .prose p:last-child {
        margin-bottom: 0;
    }
</style>
{% endblock %}
