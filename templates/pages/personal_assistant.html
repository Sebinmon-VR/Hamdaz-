{% extends "base.html" %}

{% block content %}
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>

<div class="flex justify-center mt-6 px-4 pb-10">
    <div class="flex flex-col w-full max-w-5xl h-[75vh] min-h-[600px] overflow-hidden">
        
        <!-- Header -->
        <div class="border-b border-gray-200 p-4 shrink-0 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <div class="w-12 h-12 rounded-full overflow-hidden shadow-sm flex items-center justify-center bg-blue-50">
                    <img src="/static/images/bot_avatar.png" alt="AI Agent" class="w-full h-full object-cover">
                </div>
                <div>
                    <h2 class="text-lg font-bold text-gray-800">Personal Assistant</h2>
                    <p class="text-xs text-green-500 font-medium flex items-center gap-1">
                        <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span> Online
                    </p>
                </div>
            </div>
        </div>

        <!-- Chat Box -->
        <div id="chatBox" class="flex-1 overflow-y-auto p-4 space-y-3"></div>

        <!-- File Upload Info -->
        <div id="fileInfo" class="hidden px-4 py-2 text-sm text-gray-600 bg-gray-50 border-x">
            <span id="fileNameDisplay"></span>
            <button onclick="clearFiles()" class="ml-2 text-red-500 hover:text-red-700 font-bold">&times;</button>
        </div>

        <!-- Input Box -->
        <div class="px-4 pb-6 pt-2 shrink-0">
            <div class="flex items-end space-x-2 bg-white rounded-3xl border border-gray-200 focus-within:border-indigo-300 focus-within:ring-4 focus-within:ring-indigo-50 shadow-sm overflow-hidden transition-all duration-300 relative group">
                <!-- File attachment button -->
                <label for="fileInput" class="cursor-pointer p-3 pl-4 text-gray-400 hover:text-indigo-600 transition-colors" title="Attach Files">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13" />
                    </svg>
                </label>
                <input type="file" id="fileInput" class="hidden" multiple accept=".pdf,.xlsx,.xls,.doc,.docx,.csv,.txt" onchange="updateFileInfo()">

                <textarea id="messageInput" rows="1"
                    class="flex-1 py-3.5 pr-14 bg-transparent border-none focus:ring-0 resize-none max-h-32 text-gray-800 placeholder-gray-400 text-base leading-relaxed"
                    placeholder="Message Personal Assistant..."></textarea>
                
                <!-- Send button integrated inside the input area -->
                <button id="sendBtn" class="absolute right-1.5 bottom-1.5 p-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-full transition shadow-sm shrink-0 flex items-center justify-center disabled:opacity-50 disabled:cursor-not-allowed">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z" />
                    </svg>
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    const chatBox = document.getElementById("chatBox");
    const messageInput = document.getElementById("messageInput");
    const sendBtn = document.getElementById("sendBtn");
    const fileInput = document.getElementById("fileInput");
    const fileInfo = document.getElementById("fileInfo");
    const fileNameDisplay = document.getElementById("fileNameDisplay");

    function updateFileInfo() {
        if (fileInput.files.length > 0) {
            let names = Array.from(fileInput.files).map(f => f.name).join(", ");
            fileNameDisplay.textContent = "Attached: " + names;
            fileInfo.classList.remove("hidden");
        } else {
            clearFiles();
        }
    }

    function clearFiles() {
        fileInput.value = "";
        fileNameDisplay.textContent = "";
        fileInfo.classList.add("hidden");
    }

    function scrollToBottom() {
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    // Append message with animation + typing effect for assistant
    function appendMessage(message, sender, typing = false) {
        const wrapper = document.createElement("div");
        wrapper.classList.add("w-full", "flex", "fade-in");

        const div = document.createElement("div");
        div.classList.add(
            "p-3", "rounded-xl", "inline-block", "max-w-[80%]",
            "break-words", "bubble-anim"
        );

        const avatar = document.createElement("div");
        avatar.classList.add("w-8", "h-8", "rounded-full", "flex", "items-center", "justify-center", "text-white", "font-bold", "shadow-sm", "shrink-0", "mt-auto", "mb-2", "overflow-hidden");

        if (sender === "user") {
            div.classList.add("bg-blue-600", "text-white", "ml-auto");
            wrapper.classList.add("justify-end");
            div.innerHTML = marked.parse(message);
        }
        else if (sender === "assistant") {
            avatar.classList.add("bg-blue-100", "mr-2");
            avatar.innerHTML = `<img src="/static/images/bot_avatar.png" alt="Bot" class="w-full h-full object-cover">`;
            wrapper.appendChild(avatar);

            div.classList.add("bg-white", "text-gray-800", "mr-auto", "border", "border-gray-100", "rounded-bl-sm", "prose", "prose-sm");
            wrapper.classList.add("justify-start");

            if (typing) {
                avatar.classList.add("bot-floating");
                let index = 0;

                // Check if this is an email draft — render UI card
                if (message.includes("EMAIL_DRAFT_START")) {
                    const match = message.match(/EMAIL_DRAFT_START\n([\s\S]*?)\nEMAIL_DRAFT_END/);
                    if (match && match[1]) {
                        try {
                            const emailData = JSON.parse(match[1]);
                            // Override the div to be a plain container (no max-width/prose)
                            div.className = "bubble-anim";
                            div.innerHTML = renderEmailUI(emailData);
                            avatar.classList.remove("bot-floating");
                            wrapper.appendChild(div);
                            chatBox.appendChild(wrapper);
                            scrollToBottom();
                            return; // Done — skip normal flow
                        } catch (e) {
                            console.error("Failed to parse email JSON", e);
                        }
                    }
                }

                const interval = setInterval(() => {
                    div.innerHTML = marked.parse(message.slice(0, index++));
                    scrollToBottom();
                    if (index > message.length) clearInterval(interval);
                }, 5);
            } else {
                if (message.includes("EMAIL_DRAFT_START")) {
                    const match = message.match(/EMAIL_DRAFT_START\n([\s\S]*?)\nEMAIL_DRAFT_END/);
                    if (match && match[1]) {
                        try {
                            const emailData = JSON.parse(match[1]);
                            div.className = "bubble-anim";
                            div.innerHTML = renderEmailUI(emailData);
                            wrapper.appendChild(div);
                            chatBox.appendChild(wrapper);
                            scrollToBottom();
                            return;
                        } catch (e) {
                            console.error("Failed to parse email JSON", e);
                        }
                    }
                }
                div.innerHTML = marked.parse(message);
            }
        }

        wrapper.appendChild(div);
        chatBox.appendChild(wrapper);
        scrollToBottom();
    }

    // FIRST BOT MESSAGE (GREETING)
    window.onload = function () {
        appendMessage(
            "**Hello! I'm your Personal AI Assistant.**\n\nI can:\n- 📋 Check your active tasks from SharePoint\n- 📎 Analyze uploaded PDFs, Excels, Word Docs & CSVs\n- 🗄️ Check your internal Cosmos DB for product prices & items\n- 🌍 Search the web for distributors, suppliers, and live prices\n- ✉️ **Draft, edit, and send emails via Outlook** — just say *\"write an email to...\"*\n\nHow can I help you today?",
            "assistant",
            true
        );
    };

    // ============================================================
    // RENDER EMAIL DRAFT UI
    // ============================================================
    function renderEmailUI(emailData) {
        const id = 'email_' + Date.now();
        return `
        <div id="${id}" class="email-card">
            <div class="email-card-header">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="email-icon"><path d="M1.5 8.67v8.58a3 3 0 003 3h15a3 3 0 003-3V8.67l-8.928 5.493a3 3 0 01-3.144 0L1.5 8.67z"/><path d="M22.5 6.908V6.75a3 3 0 00-3-3h-15a3 3 0 00-3 3v.158l9.714 5.978a1.5 1.5 0 001.572 0L22.5 6.908z"/></svg>
                <span class="email-card-title">Email Draft</span>
                <div class="email-status-badge">AI Generated</div>
            </div>
            <div class="email-card-body">
                <div class="email-field">
                    <label class="email-label">To</label>
                    <input type="email" class="email-input" id="${id}_to" value="${emailData.to || ''}" placeholder="recipient@email.com" />
                </div>
                <div class="email-field">
                    <label class="email-label">Subject</label>
                    <input type="text" class="email-input" id="${id}_subject" value="${(emailData.subject || '').replace(/"/g, '&quot;')}" placeholder="Subject" />
                </div>
                <div class="email-field">
                    <label class="email-label">Body</label>
                    <textarea class="email-textarea" id="${id}_body" rows="8">${emailData.body || ''}</textarea>
                </div>
            </div>
            <div class="email-card-footer">
                <button class="email-btn email-btn-copy" onclick="copyEmailDraft('${id}')">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="btn-icon"><path d="M7.5 3.375c0-1.036.84-1.875 1.875-1.875h.375a3.75 3.75 0 013.75 3.75v1.875C13.5 8.161 14.34 9 15.375 9h1.875A3.75 3.75 0 0121 12.75v3.375C21 17.16 20.16 18 19.125 18h-9.75A1.875 1.875 0 017.5 16.125V3.375z"/><path d="M15 5.25a5.23 5.23 0 00-1.279-3.434 9.768 9.768 0 016.963 6.963A5.23 5.23 0 0017.25 7.5h-1.875A.375.375 0 0115 7.125V5.25zM4.875 6H6v10.125A3.375 3.375 0 009.375 19.5H16.5v1.125c0 1.035-.84 1.875-1.875 1.875h-9.75A1.875 1.875 0 013 20.625V7.875C3 6.839 3.84 6 4.875 6z"/></svg>
                    Copy
                </button>
                <button class="email-btn email-btn-regen" onclick="regenerateEmail('${id}')">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="btn-icon"><path fill-rule="evenodd" d="M4.755 10.059a7.5 7.5 0 0112.548-3.364l1.903 1.927H16.5a.75.75 0 010 1.5h-4.374a.75.75 0 01-.75-.75V5.998a.75.75 0 011.5 0v1.652l1.949-1.97a9 9 0 11-2.586 6.036.75.75 0 011.497.116A7.5 7.5 0 114.755 10.06z" clip-rule="evenodd"/></svg>
                    Regenerate
                </button>
                <button class="email-btn email-btn-send" onclick="sendEmailDraft('${id}')">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="btn-icon"><path d="M3.478 2.405a.75.75 0 00-.926.94l2.432 7.905H13.5a.75.75 0 010 1.5H4.984l-2.432 7.905a.75.75 0 00.926.94 60.519 60.519 0 0018.445-8.986.75.75 0 000-1.218A60.517 60.517 0 003.478 2.405z"/></svg>
                    Send via Outlook
                </button>
            </div>
        </div>`;
    }

    // Copy draft to clipboard
    function copyEmailDraft(id) {
        const to = document.getElementById(id + '_to').value;
        const subject = document.getElementById(id + '_subject').value;
        const body = document.getElementById(id + '_body').value;
        const text = `To: ${to}\nSubject: ${subject}\n\n${body}`;
        navigator.clipboard.writeText(text).then(() => {
            showEmailToast('📋 Email copied to clipboard!');
        });
    }

    // Regenerate: populate the input with a prompt and send
    function regenerateEmail(id) {
        const subject = document.getElementById(id + '_subject').value;
        messageInput.value = `Please regenerate the email about "${subject}" with any improvements or based on my feedback.`;
        messageInput.focus();
    }

    // Show a confirmation popup before sending
    async function sendEmailDraft(id) {
        const to = document.getElementById(id + '_to').value.trim();
        const subject = document.getElementById(id + '_subject').value.trim();
        const body = document.getElementById(id + '_body').value.trim();

        if (!to) { showEmailToast('⚠️ Please enter a recipient email address.', 'warn'); return; }

        // Show custom confirm popup
        const confirmed = await showSendConfirm(to, subject);
        if (!confirmed) return;

        try {
            const res = await fetch('/api/send_email', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ to, subject, body })
            });
            const data = await res.json();
            if (data.success) {
                showEmailToast('✅ Email sent successfully via Outlook!');
            } else {
                showEmailToast('❌ Failed: ' + data.error, 'error');
            }
        } catch (err) {
            showEmailToast('❌ Network error: ' + err.message, 'error');
        }
    }

    // Toast notification
    function showEmailToast(msg, type = 'success') {
        const toast = document.createElement('div');
        toast.className = 'email-toast ' + (type === 'error' ? 'toast-error' : type === 'warn' ? 'toast-warn' : 'toast-success');
        toast.textContent = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.classList.add('show'), 10);
        setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 300); }, 3500);
    }

    // Custom confirmation popup
    function showSendConfirm(to, subject) {
        return new Promise((resolve) => {
            const overlay = document.createElement('div');
            overlay.className = 'confirm-overlay';
            overlay.innerHTML = `
                <div class="confirm-box">
                    <div class="confirm-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M1.5 8.67v8.58a3 3 0 003 3h15a3 3 0 003-3V8.67l-8.928 5.493a3 3 0 01-3.144 0L1.5 8.67z"/><path d="M22.5 6.908V6.75a3 3 0 00-3-3h-15a3 3 0 00-3 3v.158l9.714 5.978a1.5 1.5 0 001.572 0L22.5 6.908z"/></svg>
                    </div>
                    <h3 class="confirm-title">Send this Email?</h3>
                    <p class="confirm-desc">This will be sent from your Outlook account to:</p>
                    <div class="confirm-recipient">${to}</div>
                    <p class="confirm-subject">Subject: <strong>${subject}</strong></p>
                    <div class="confirm-actions">
                        <button class="confirm-btn-cancel" id="confirmCancel">Cancel</button>
                        <button class="confirm-btn-send" id="confirmSend">Yes, Send</button>
                    </div>
                </div>`;
            document.body.appendChild(overlay);
            setTimeout(() => overlay.classList.add('show'), 10);

            document.getElementById('confirmSend').onclick = () => { overlay.remove(); resolve(true); };
            document.getElementById('confirmCancel').onclick = () => { overlay.remove(); resolve(false); };
        });
    }

    async function sendMessage() {
        const message = messageInput.value.trim();
        const files = fileInput.files;

        if (!message && files.length === 0) return;

        let displayMsg = message;
        if (files.length > 0) {
            displayMsg += `\n\n*(📎 Attached ${files.length} file(s))*`;
        }

        appendMessage(displayMsg, "user");

        // Disable inputs
        messageInput.value = "";
        messageInput.disabled = true;
        sendBtn.disabled = true;
        fileInput.disabled = true;

        // Loading bubble
        const loading = appendLoadingBubble();

        // Stop floating of the latest bot message once finished
        function removePulsing() {
            const bots = chatBox.querySelectorAll('.bot-floating');
            bots.forEach(b => b.classList.remove('bot-floating'));
        }

        try {
            const formData = new FormData();
            formData.append("message", message);
            for (let i = 0; i < files.length; i++) {
                formData.append("files", files[i]);
            }

            const res = await fetch("/api/personal_assistant/chat", {
                method: "POST",
                body: formData
            });

            const data = await res.json();
            clearInterval(loading._thinkingInterval);
            loading.remove();
            removePulsing(); // Stop floating
            
            // Clear files after successful request starts processing
            clearFiles();

            if (data.reply) {
                appendMessage(data.reply, "assistant", true);
            } else {
                appendMessage("Error: " + data.error, "assistant");
            }
        } catch (err) {
            clearInterval(loading._thinkingInterval);
            loading.remove();
            removePulsing(); // Stop floating
            appendMessage("Error connecting to server.", "assistant");
            console.error(err);
        } finally {
            messageInput.disabled = false;
            sendBtn.disabled = false;
            fileInput.disabled = false;
            messageInput.focus();
        }
    }

    function appendLoadingBubble() {
        const wrapper = document.createElement("div");
        wrapper.classList.add("w-full", "flex", "justify-start", "fade-in");

        const avatar = document.createElement("div");
        avatar.classList.add("w-8", "h-8", "rounded-full", "flex", "items-center", "justify-center", "text-white", "font-bold", "shadow-sm", "shrink-0", "mt-auto", "mb-2", "overflow-hidden", "bg-blue-100", "mr-2", "bot-floating");
        avatar.innerHTML = `<img src="/static/images/bot_avatar.png" alt="Bot" class="w-full h-full object-cover">`;
        wrapper.appendChild(avatar);

        const div = document.createElement("div");
        div.classList.add("p-3", "px-4", "rounded-xl", "inline-block", "bg-white", "mr-auto", "border", "border-gray-100");
        
        const thinkingSteps = [
            "🧠 Thinking...",
            "📎 Analyzing your request...",
            "🗄️ Checking internal database...",
            "🌍 Looking up information...",
            "✍️ Drafting a response...",
            "🔍 Processing context...",
            "⚙️ Running tools...",
        ];
        let stepIdx = 0;
        div.innerHTML = `<span class="thinking-status">${thinkingSteps[0]}</span>`;
        const statusInterval = setInterval(() => {
            stepIdx = (stepIdx + 1) % thinkingSteps.length;
            const el = div.querySelector('.thinking-status');
            if (el) el.textContent = thinkingSteps[stepIdx];
        }, 1800);
        // Store interval id so we can clear it when removing bubble
        wrapper._thinkingInterval = statusInterval;

        wrapper.appendChild(div);
        chatBox.appendChild(wrapper);
        scrollToBottom();

        return wrapper;
    }

    // Enter to send, Shift+Enter for new line
    messageInput.addEventListener("keydown", function (e) {
        if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    sendBtn.addEventListener("click", sendMessage);
</script>

<style>
    /* Bubble pop animation */
    .bubble-anim {
        animation: popIn 0.1s ease-out;
    }

    @keyframes popIn {
        0% {
            transform: scale(0.8);
            opacity: 0;
        }

        100% {
            transform: scale(1);
            opacity: 1;
        }
    }

    /* Typing dots */
    .typing-dots span {
        height: 8px;
        width: 8px;
        margin: 0 2px;
        background: gray;
        border-radius: 50%;
        display: inline-block;
        animation: blink 1.4s infinite;
    }

    .typing-dots span:nth-child(2) {
        animation-delay: 0.1s;
    }

    .typing-dots span:nth-child(3) {
        animation-delay: 0.3s;
    }

    @keyframes blink {

        0%,
        100% {
            opacity: 0.2;
        }

        50% {
            opacity: 1;
        }
    }

    /* 3D Bot Avatar Floating Animation */
    .bot-floating {
        animation: floatBot 2s ease-in-out infinite;
        transform-origin: center bottom;
        box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.4);
    }
    @keyframes floatBot {
        0% { transform: translateY(0) scale(1) rotate(0deg); }
        50% { transform: translateY(-8px) scale(1.05) rotate(5deg); }
        100% { transform: translateY(0) scale(1) rotate(0deg); }
    }

    /* Custom scrollbar for chatbox */
    #chatBox::-webkit-scrollbar {
        width: 8px;
    }

    #chatBox::-webkit-scrollbar-track {
        background: #f1f1f1;
        border-radius: 10px;
    }

    #chatBox::-webkit-scrollbar-thumb {
        background: #888;
        border-radius: 10px;
    }

    #chatBox::-webkit-scrollbar-thumb:hover {
        background: #555;
    }

    .prose p {
        margin-bottom: 0.5rem;
    }

    .prose p:last-child {
        margin-bottom: 0;
    }

    /* Thinking status text */
    .thinking-status {
        font-size: 13px;
        color: #6366f1;
        font-weight: 500;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        animation: fadeStatus 0.4s ease;
    }
    @keyframes fadeStatus {
        0% { opacity: 0; transform: translateY(3px); }
        100% { opacity: 1; transform: translateY(0); }
    }

    /* ============== EMAIL CARD ============== */
    .email-card {
        background: #fff;
        border: 1px solid #e0e7ff;
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 4px 20px rgba(99,102,241,0.10);
        min-width: 320px;
        max-width: 100%;
        font-family: inherit;
    }
    .email-card-header {
        background: linear-gradient(135deg, #4f46e5, #7c3aed);
        padding: 14px 18px;
        display: flex;
        align-items: center;
        gap: 10px;
        color: #fff;
    }
    .email-icon {
        width: 20px; height: 20px; flex-shrink: 0;
    }
    .email-card-title {
        font-size: 15px; font-weight: 700; flex: 1;
    }
    .email-status-badge {
        font-size: 11px;
        background: rgba(255,255,255,0.2);
        border-radius: 20px;
        padding: 2px 10px;
        letter-spacing: 0.03em;
    }
    .email-card-body {
        padding: 16px 18px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        background: #f8f9ff;
    }
    .email-field {
        display: flex;
        flex-direction: column;
        gap: 4px;
    }
    .email-label {
        font-size: 11px;
        font-weight: 700;
        color: #6366f1;
        text-transform: uppercase;
        letter-spacing: 0.06em;
    }
    .email-input {
        border: 1.5px solid #e0e7ff;
        border-radius: 8px;
        padding: 8px 12px;
        font-size: 14px;
        color: #1e1b4b;
        background: #fff;
        outline: none;
        transition: border-color 0.2s;
        width: 100%;
        box-sizing: border-box;
    }
    .email-input:focus {
        border-color: #6366f1;
        box-shadow: 0 0 0 3px rgba(99,102,241,0.10);
    }
    .email-textarea {
        border: 1.5px solid #e0e7ff;
        border-radius: 8px;
        padding: 10px 12px;
        font-size: 14px;
        color: #1e1b4b;
        background: #fff;
        outline: none;
        transition: border-color 0.2s;
        width: 100%;
        box-sizing: border-box;
        resize: vertical;
        line-height: 1.6;
        font-family: inherit;
    }
    .email-textarea:focus {
        border-color: #6366f1;
        box-shadow: 0 0 0 3px rgba(99,102,241,0.10);
    }
    .email-card-footer {
        padding: 12px 18px;
        background: #fff;
        border-top: 1px solid #e0e7ff;
        display: flex;
