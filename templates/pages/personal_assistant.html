{% extends "base.html" %}

{% block content %}
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>

<div class="flex h-[85vh] min-h-[600px] max-w-7xl mx-auto mt-6 px-4 pb-10 gap-6">

    <!-- Sidebar -->
    <div class="w-72 flex flex-col bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden shrink-0">
        <div class="p-4 border-b border-gray-100">
            <button onclick="startNewChat()"
                class="w-full flex items-center justify-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white py-2.5 px-4 rounded-xl font-medium transition-colors shadow-sm">
                <i class="fa-solid fa-plus text-sm"></i> New Chat
            </button>
        </div>

        <div class="flex-1 overflow-y-auto w-full">
            <div id="sessionList" class="p-3 space-y-1 w-full">
                <!-- Session items will be inserted here -->
            </div>
        </div>

        <div
            class="p-4 text-xs text-center text-gray-400 border-t border-gray-100 bg-gray-50 flex items-center justify-center gap-2">
            <i class="fa-solid fa-circle-info text-indigo-300"></i>
            Sessions auto-delete after 5 days.
        </div>
    </div>

    <!-- Main Chat Area -->
    <div class="flex-1 flex flex-col bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden relative">
        <!-- Header -->
        <div
            class="border-b border-gray-100 p-4 shrink-0 flex items-center justify-between bg-white z-10 shadow-sm relative">
            <div class="flex items-center space-x-3">
                
                <div
                    class="w-10 h-10 rounded-full overflow-hidden shadow-sm flex items-center justify-center bg-indigo-50 border border-indigo-100">
                    <img src="/static/images/bot_avatar.png" alt="AI Agent" class="w-full h-full object-cover">
                </div>
                <div>
                    <h2 class="text-base font-bold text-gray-800" id="currentChatTitle">AI Assistant</h2>
                    <p class="text-xs text-emerald-500 font-medium flex items-center gap-1.5 mt-0.5">
                        <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span> Online
                    </p>
                </div>
                
            </div>
            <!-- Agent Mode Toggle -->
            <div class="flex items-center gap-2.5 select-none" style="opacity: 0.3;">
                <div class="flex items-center gap-2 bg-gray-50 border border-gray-200 rounded-xl px-3 py-2 cursor-pointer hover:border-indigo-200 transition-colors" onclick="toggleAgentMode()" title="Toggle agent tools (task lookup, web search, email)">
                    <!-- <i id="agentIcon" class="fa-solid fa-robot text-indigo-500 text-sm"></i> -->
                    <span class="text-xs font-semibold text-gray-600">Agent</span>
                    <!-- Toggle pill -->
                    <div id="agentToggle" class="relative w-9 h-5 rounded-full transition-colors duration-300 bg-indigo-500 "  >
                        <div id="agentThumb" class="absolute top-0.5 left-0.5 w-4 h-4 rounded-full bg-white shadow-sm transition-transform duration-300 translate-x-4"></div>
                    </div>
                </div>
            </div>
        </div>
        

        <!-- Chat Box -->
        <div id="chatBox" class="flex-1 overflow-y-auto p-6 space-y-6 bg-slate-50 relative"></div>

        <!-- File Upload Info -->
        <div id="fileInfo"
            class="hidden px-6 py-2.5 text-sm text-indigo-700 bg-indigo-50/80 border-t border-indigo-100 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-file-lines text-indigo-500"></i>
                <span id="fileNameDisplay" class="font-medium"></span>
            </div>
            <button onclick="clearFiles()"
                class="text-indigo-400 hover:text-indigo-600 font-bold transition-colors w-6 h-6 flex items-center justify-center rounded-full hover:bg-indigo-100">&times;</button>
        </div>

        <!-- Input Box -->
        <div class="p-4 bg-white shrink-0 border-t border-gray-100">
            <div
                class="flex items-end space-x-2 bg-white rounded-2xl border border-gray-300 focus-within:border-indigo-400 focus-within:ring-4 focus-within:ring-indigo-50/50 shadow-sm overflow-hidden transition-all duration-300 relative group">
                <!-- File attachment button -->
                <label for="fileInput"
                    class="cursor-pointer p-3.5 pl-4 text-gray-400 hover:text-indigo-600 transition-colors"
                    title="Attach Files">
                    <i class="fa-solid fa-paperclip text-lg"></i>
                </label>
                <input type="file" id="fileInput" class="hidden" multiple accept=".pdf,.xlsx,.xls,.doc,.docx,.csv,.txt"
                    onchange="updateFileInfo()">

                <textarea id="messageInput" rows="1"
                    class="flex-1 py-4 flex items-center pr-14 bg-transparent border-none focus:ring-0 resize-none max-h-32 text-gray-700 placeholder-gray-400 text-[15px] leading-relaxed"
                    placeholder="Ask me anything..."></textarea>

                <!-- Send button integrated inside the input area -->
                <button id="sendBtn"
                    class="absolute right-2 bottom-2 p-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl transition-all shadow-md shrink-0 flex items-center justify-center disabled:opacity-50 disabled:cursor-not-allowed w-10 h-10 hover:scale-105 active:scale-95">
                    <i class="fa-solid fa-paper-plane text-sm ml-0.5 mt-0.5"></i>
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    const chatBox = document.getElementById("chatBox");
    const messageInput = document.getElementById("messageInput");
    const sendBtn = document.getElementById("sendBtn");
    const fileInput = document.getElementById("fileInput");
    const fileInfo = document.getElementById("fileInfo");
    const fileNameDisplay = document.getElementById("fileNameDisplay");
    const sessionList = document.getElementById("sessionList");
    const currentChatTitle = document.getElementById("currentChatTitle");

    let currentSessionId = sessionStorage.getItem('pa_session_id') || null;

    // Load sessions on init
    window.onload = function () {
        fetchSessions();
        if (!currentSessionId) {
            showGreeting();
        }
    };

    async function fetchSessions() {
        try {
            const res = await fetch("/api/personal_assistant/sessions");
            const data = await res.json();
            if (data.sessions) {
                renderSessionList(data.sessions);
            }
        } catch (e) {
            console.error("Failed to load sessions", e);
        }
    }

    function renderSessionList(sessions) {
        sessionList.innerHTML = "";
        if (sessions.length === 0) {
            sessionList.innerHTML = `<div class="text-center text-gray-400 text-sm py-4">No recent chats</div>`;
            return;
        }

        sessions.forEach(s => {
            const isActive = s.id === currentSessionId;
            const div = document.createElement("div");
            div.className = `flex justify-between items-center group p-2.5 rounded-xl cursor-pointer transition-all ${isActive ? 'bg-indigo-50 text-indigo-700 font-medium border border-indigo-100/50' : 'hover:bg-gray-50 text-gray-600 border border-transparent'}`;

            div.innerHTML = `
                <div class="flex items-center gap-3 truncate flex-1 min-w-0" onclick="loadSession('${s.id}', '${s.session_title.replace(/'/g, "\\'")}')">
                    <i class="fa-regular fa-message text-sm shrink-0 ${isActive ? 'text-indigo-500' : 'text-gray-400 group-hover:text-indigo-400'}"></i>
                    <span class="text-sm truncate select-none">${s.session_title}</span>
                </div>
                <button onclick="deleteSession(event, '${s.id}')" 
                    class="text-gray-300 hover:text-red-500 hover:bg-red-50 p-1.5 rounded-lg transition-colors shrink-0 ml-1" 
                    title="Delete session">
                    <i class="fa-regular fa-trash-can text-xs"></i>
                </button>
            `;
            sessionList.appendChild(div);
        });
    }

    async function loadSession(sessionId, title) {
        currentSessionId = sessionId;
        sessionStorage.setItem('pa_session_id', sessionId);
        currentChatTitle.textContent = title;
        chatBox.innerHTML = "";

        // refresh sidebar to highlight active session
        fetchSessions();

        // update URL
        const newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname + '?session=' + sessionId;
        window.history.pushState({ path: newUrl }, '', newUrl);

        const loading = appendLoadingBubble();
        loading.querySelector('.thinking-status').textContent = 'Loading...';

        try {
            const res = await fetch(`/api/personal_assistant/sessions/${sessionId}`);
            const data = await res.json();

            loading.remove();

            if (data.messages) {
                if (data.messages.length === 0) showGreeting();
                data.messages.forEach(m => appendMessage(m.content, m.role, false));
            } else {
                showGreeting();
            }
        } catch (e) {
            loading.remove();
            console.error(e);
            appendMessage("Failed to load session history.", "assistant");
        }
    }

    function startNewChat() {
        currentSessionId = null;
        sessionStorage.removeItem('pa_session_id');
        currentChatTitle.textContent = "AI Personal Assistant";
        chatBox.innerHTML = "";
        fetchSessions();
        showGreeting();
        const newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname;
        window.history.pushState({ path: newUrl }, '', newUrl);
    }

    async function deleteSession(event, sessionId) {
        event.stopPropagation();
        if (!confirm("Are you sure you want to delete this session?")) return;

        try {
            await fetch(`/api/personal_assistant/sessions/${sessionId}`, { method: 'DELETE' });
            if (currentSessionId === sessionId) {
                startNewChat();
            } else {
                fetchSessions();
            }
        } catch (e) {
            console.error(e);
            alert("Failed to delete session");
        }
    }

    function showGreeting() {
        appendMessage(
            "**Hello! I'm your Personal AI Assistant.**\n\nI can:\n- 📋 Check your active tasks from SharePoint\n- 📎 Analyze uploaded PDFs, Excels, Word Docs & CSVs\n- 🗄️ Check your internal database for product prices\n- 🌍 Search the web for distributors and suppliers\n- ✉️ **Draft and send emails** via Outlook\n\nHow can I help you today?",
            "assistant",
            true
        );
    }

    function updateFileInfo() {
        if (fileInput.files.length > 0) {
            let names = Array.from(fileInput.files).map(f => f.name).join(", ");
            fileNameDisplay.textContent = names;
            fileInfo.classList.remove("hidden");
        } else {
            clearFiles();
        }
    }

    function clearFiles() {
        fileInput.value = "";
        fileNameDisplay.textContent = "";
        fileInfo.classList.add("hidden");
    }

    function scrollToBottom() {
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    // Append message with animation + styling
    function appendMessage(message, sender, typing = false) {
        const wrapper = document.createElement("div");
        wrapper.classList.add("w-full", "flex", "fade-in");

        const div = document.createElement("div");
        div.classList.add(
            "p-3.5", "rounded-2xl", "inline-block", "max-w-[85%]", // wider max-width for better reading
            "break-words", "bubble-anim", "text-[15px]", "leading-relaxed", "shadow-sm"
        );

        if (sender === "user") {
            div.classList.add("bg-indigo-600", "text-white", "ml-auto", "rounded-tr-sm");
            wrapper.classList.add("justify-end");
            div.innerHTML = marked.parse(message);
            // fix user links color just in case
            const links = div.querySelectorAll("a");
            links.forEach(l => l.classList.add("underline", "text-indigo-100", "hover:text-white"));
        } else {
            // Assistant
            const avatar = document.createElement("div");
            avatar.classList.add("w-8", "h-8", "rounded-full", "flex", "items-center", "justify-center", "shrink-0", "mt-auto", "mb-1.5", "overflow-hidden", "bg-indigo-50", "border", "border-indigo-100", "mr-3");
            avatar.innerHTML = `<img src="/static/images/bot_avatar.png" alt="Bot" class="w-full h-full object-cover">`;
            wrapper.appendChild(avatar);

            div.classList.add("bg-white", "text-gray-800", "mr-auto", "border", "border-gray-200/60", "rounded-bl-sm", "prose-custom");
            wrapper.classList.add("justify-start");

            if (typing) {
                avatar.classList.add("bot-floating");
                let index = 0;

                if (message.includes("EMAIL_DRAFT_START")) {
                    renderEmailSafely(message, div, avatar, wrapper);
                    return;
                }

                const interval = setInterval(() => {
                    div.innerHTML = marked.parse(message.slice(0, index++));
                    scrollToBottom();
                    if (index > message.length) {
                        clearInterval(interval);
                        avatar.classList.remove("bot-floating");
                    }
                }, 5);
            } else {
                if (message.includes("EMAIL_DRAFT_START")) {
                    renderEmailSafely(message, div, avatar, wrapper);
                    return;
                }
                div.innerHTML = marked.parse(message);
            }
        }

        wrapper.appendChild(div);
        chatBox.appendChild(wrapper);
        scrollToBottom();
    }

    function renderEmailSafely(message, div, avatar, wrapper) {
        const match = message.match(/EMAIL_DRAFT_START\n([\s\S]*?)\nEMAIL_DRAFT_END/);
        if (match && match[1]) {
            try {
                const emailData = JSON.parse(match[1]);
                div.className = "bubble-anim shadow-md rounded-2xl border border-gray-100 overflow-hidden bg-white max-w-[90%]";
                div.innerHTML = renderEmailUI(emailData);
                avatar.classList.remove("bot-floating");
                wrapper.appendChild(div);
                chatBox.appendChild(wrapper);
                scrollToBottom();
            } catch (e) {
                console.error("Failed to parse email JSON", e);
                div.innerHTML = "Error parsing email draft.";
                wrapper.appendChild(div);
                chatBox.appendChild(wrapper);
            }
        }
    }

    // ============================================================
    // SLEEK EMAIL DRAFT UI
    // ============================================================
    function renderEmailUI(emailData) {
        const id = 'email_' + Date.now();
        return `
        <div id="${id}" class="email-card w-[450px] max-w-full">
            <div class="px-5 py-3.5 bg-gradient-to-r from-gray-50 to-white border-b border-gray-100 flex items-center gap-3">
                <div class="w-8 h-8 rounded-lg bg-indigo-50 flex items-center justify-center text-indigo-600">
                    <i class="fa-regular fa-envelope text-lg"></i>
                </div>
                <div class="flex-1">
                    <h3 class="text-[15px] font-bold text-gray-800 leading-tight">Email Draft</h3>
                    <p class="text-[11px] font-medium text-gray-400 uppercase tracking-widest mt-0.5">AI Generated</p>
                </div>
            </div>
            
            <div class="p-5 space-y-4 bg-white">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1.5 ml-1">To</label>
                    <input type="email" id="${id}_to" value="${emailData.to || ''}" placeholder="recipient@example.com" 
                        class="w-full bg-gray-50/50 border border-gray-200 rounded-xl px-4 py-2.5 text-sm text-gray-800 focus:outline-none focus:ring-2 focus:ring-indigo-100 focus:border-indigo-400 transition-all font-medium" />
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1.5 ml-1">Subject</label>
                    <input type="text" id="${id}_subject" value="${(emailData.subject || '').replace(/"/g, '&quot;')}" placeholder="Subject line" 
                        class="w-full bg-gray-50/50 border border-gray-200 rounded-xl px-4 py-2.5 text-sm text-gray-800 focus:outline-none focus:ring-2 focus:ring-indigo-100 focus:border-indigo-400 transition-all font-medium" />
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1.5 ml-1">Message</label>
                    <textarea id="${id}_body" rows="7" 
                        class="w-full bg-gray-50/50 border border-gray-200 rounded-xl px-4 py-3 text-[14px] text-gray-700 focus:outline-none focus:ring-2 focus:ring-indigo-100 focus:border-indigo-400 transition-all resize-y leading-relaxed">${emailData.body || ''}</textarea>
                </div>
            </div>

            <div class="px-5 py-4 bg-gray-50/50 border-t border-gray-100 flex flex-wrap gap-2 justify-end">
                <button onclick="copyEmailDraft('${id}')" 
                    class="px-4 py-2 rounded-lg text-xs font-semibold text-gray-600 hover:text-gray-800 hover:bg-gray-200/50 bg-gray-100 border border-gray-200 transition-colors flex items-center gap-1.5">
                    <i class="fa-regular fa-copy"></i> Copy
                </button>
                <button onclick="regenerateEmail('${id}')" 
                    class="px-4 py-2 rounded-lg text-xs font-semibold text-amber-700 hover:text-amber-800 hover:bg-amber-200/50 bg-amber-100 border border-amber-200/50 transition-colors flex items-center gap-1.5">
                    <i class="fa-solid fa-rotate-right"></i> Redo
                </button>
                <button onclick="sendEmailDraft('${id}')" 
                    class="px-5 py-2 rounded-lg text-xs font-semibold text-white bg-indigo-600 hover:bg-indigo-700 shadow-sm shadow-indigo-200 transition-all flex items-center gap-1.5 ml-auto">
                    <i class="fa-regular fa-paper-plane"></i> Send
                </button>
            </div>
        </div>`;
    }

    // Email interactions (unchanged logic, just styled differently if needed)
    function copyEmailDraft(id) {
        const to = document.getElementById(id + '_to').value;
        const subject = document.getElementById(id + '_subject').value;
        const body = document.getElementById(id + '_body').value;
        navigator.clipboard.writeText(`To: ${to}\nSubject: ${subject}\n\n${body}`).then(() => showToast('Email copied!'));
    }

    function regenerateEmail(id) {
        const subject = document.getElementById(id + '_subject').value;
        messageInput.value = `Please regenerate the email about "${subject}" with improvements.`;
        messageInput.focus();
    }

    async function sendEmailDraft(id) {
        const to = document.getElementById(id + '_to').value.trim();
        const subject = document.getElementById(id + '_subject').value.trim();
        const body = document.getElementById(id + '_body').value.trim();

        if (!to) { showToast('Please enter a recipient.', 'warn'); return; }
        if (!confirm(`Send email to ${to}?`)) return;

        try {
            const res = await fetch('/api/send_email', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ to, subject, body })
            });
            const data = await res.json();
            if (data.success) showToast('Email sent via MS Graph!');
            else showToast('Failed: ' + data.error, 'error');
        } catch (err) {
            showToast('Error: ' + err.message, 'error');
        }
    }

    function showToast(msg, type = 'success') {
        const alertColor = type === 'error' ? 'bg-red-500' : (type === 'warn' ? 'bg-amber-500' : 'bg-green-500');
        const toast = document.createElement('div');
        toast.className = `fixed bottom-8 left-1/2 transform -translate-x-1/2 ${alertColor} text-white px-6 py-3 rounded-full shadow-lg font-medium text-sm transition-all duration-300 opacity-0 translate-y-4 z-50`;
        toast.textContent = msg;
        document.body.appendChild(toast);

        requestAnimationFrame(() => {
            toast.classList.remove('opacity-0', 'translate-y-4');
        });

        setTimeout(() => {
            toast.classList.add('opacity-0', 'translate-y-4');
            setTimeout(() => toast.remove(), 300);
        }, 3000);
    }

    async function sendMessage() {
        const message = messageInput.value.trim();
        const files = fileInput.files;

        if (!message && files.length === 0) return;

        let displayMsg = message;
        if (files.length > 0) {
            displayMsg += `\n\n*(📎 Attached ${files.length} file(s))*`;
        }

        appendMessage(displayMsg, "user");

        messageInput.value = "";
        messageInput.style.height = 'auto'; // reset height if auto-expanding
        messageInput.disabled = true;
        sendBtn.disabled = true;
        fileInput.disabled = true;

        const loading = appendLoadingBubble();

        function removePulsing() {
            const bots = chatBox.querySelectorAll('.bot-floating');
            bots.forEach(b => b.classList.remove('bot-floating'));
        }

        try {
            const formData = new FormData();
            formData.append("message", message);
            const sid = currentSessionId || sessionStorage.getItem('pa_session_id') || '';
            console.log('[PA] Sending message. session_id:', sid || '(none — new session)');
            if (sid) {
                formData.append("session_id", sid);
            }
            for (let i = 0; i < files.length; i++) {
                formData.append("files", files[i]);
            }

            const res = await fetch("/api/personal_assistant/chat", {
                method: "POST",
                body: formData
            });

            const data = await res.json();
            clearInterval(loading._thinkingInterval);
            loading.remove();
            removePulsing();
            clearFiles();

            if (data.reply) {
                appendMessage(data.reply, "assistant", true);
                if (data.session_id) {
                    if (currentSessionId !== data.session_id) {
                        currentSessionId = data.session_id;
                        sessionStorage.setItem('pa_session_id', currentSessionId);
                        console.log('[PA] New session_id set:', currentSessionId);
                    }
                    fetchSessions(); // always refresh sidebar
                }
            } else {
                appendMessage("Error: " + data.error, "assistant");
            }
        } catch (err) {
            clearInterval(loading._thinkingInterval);
            loading.remove();
            removePulsing();
            appendMessage("Error connecting to server.", "assistant");
        } finally {
            messageInput.disabled = false;
            sendBtn.disabled = false;
            fileInput.disabled = false;
            messageInput.focus();
        }
    }

    function appendLoadingBubble() {
        const wrapper = document.createElement("div");
        wrapper.classList.add("w-full", "flex", "justify-start", "fade-in");

        const avatar = document.createElement("div");
        avatar.classList.add("w-8", "h-8", "rounded-full", "flex", "items-center", "justify-center", "shrink-0", "mt-auto", "mb-1.5", "overflow-hidden", "bg-indigo-50", "border", "border-indigo-100", "mr-3", "bot-floating");
        avatar.innerHTML = `<img src="/static/images/bot_avatar.png" alt="Bot" class="w-full h-full object-cover">`;
        wrapper.appendChild(avatar);

        const div = document.createElement("div");
        div.classList.add("px-5", "py-3.5", "rounded-2xl", "inline-block", "bg-white", "mr-auto", "border", "border-gray-200/60", "shadow-sm");

        const thinkingSteps = [
            "<i class='fa-solid fa-microchip mr-2'></i> Thinking...",
            "<i class='fa-solid fa-magnifying-glass mr-2'></i> Analyzing...",
            "<i class='fa-solid fa-database mr-2'></i> Querying data...",
            "<i class='fa-solid fa-pen-nib mr-2'></i> Drafting...",
        ];
        let stepIdx = 0;
        div.innerHTML = `<span class="thinking-status text-indigo-500 font-medium text-sm flex items-center">${thinkingSteps[0]}</span>`;
        const statusInterval = setInterval(() => {
            stepIdx = (stepIdx + 1) % thinkingSteps.length;
            const el = div.querySelector('.thinking-status');
            if (el) el.innerHTML = thinkingSteps[stepIdx];
        }, 2000);
        wrapper._thinkingInterval = statusInterval;

        wrapper.appendChild(div);
        chatBox.appendChild(wrapper);
        scrollToBottom();

        return wrapper;
    }

    messageInput.addEventListener("keydown", function (e) {
        if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    sendBtn.addEventListener("click", sendMessage);

    // Auto-resize textarea
    messageInput.addEventListener('input', function () {
        this.style.height = 'auto';
        this.style.height = (this.scrollHeight) + 'px';
        if (this.value === '') this.style.height = 'auto';
    });
</script>

<style>
    /* Custom Markdown Prose Styling */
    .prose-custom p {
        margin-bottom: 0.75em;
    }

    .prose-custom p:last-child {
        margin-bottom: 0;
    }

    .prose-custom strong {
        color: #1e293b;
        font-weight: 600;
    }

    .prose-custom code {
        background: #f1f5f9;
        padding: 0.2rem 0.4rem;
        border-radius: 0.375rem;
        font-size: 0.875em;
        color: #db2777;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }

    .prose-custom pre {
        background: #1e293b;
        padding: 1rem;
        border-radius: 0.75rem;
        overflow-x: auto;
        margin-top: 0.5rem;
        margin-bottom: 1rem;
    }

    .prose-custom pre code {
        background: transparent;
        color: #e2e8f0;
        padding: 0;
    }

    .prose-custom ul {
        list-style-type: disc;
